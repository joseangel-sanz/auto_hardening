---
#==============================================================================
# Playbook: pre-requisites.yml
# Description: Secure Boot check, disable UFW firewall, install base packages
# Tags: prereqs
#==============================================================================

- name: Install pre-requisites
  hosts: all
  become: yes
  vars_files:
    - var.yml
  tags: prereqs

  tasks:
    - name: Install mokutil (Secure Boot tool)
      apt:
        name: mokutil
        state: present
        update_cache: yes

    - name: Check Secure Boot state
      command: mokutil --sb-state
      register: secure_boot_state
      changed_when: false
      ignore_errors: yes

    - name: Show Secure Boot state
      debug:
        msg: "Secure Boot: {{ secure_boot_state.stdout | default('Unable to determine') }}"

    - name: Disable UFW firewall
      community.general.ufw:
        state: disabled
      ignore_errors: yes

    - name: Stop and disable UFW service
      systemd:
        name: ufw
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Install required packages
      apt:
        name:
          - chrony
          - wget
          - lsof
          - telnet
          - sysstat
          - net-tools
          - unzip
        state: present
        update_cache: yes
