---
#==============================================================================
# Playbook: configure-ntp.yml
# Description: Configure chrony NTP client with Maersk internal servers
# Tags: ntp
#
# NTP servers are defined in var.yml -> ntp_servers
#==============================================================================

- name: Configure NTP (chrony)
  hosts: all
  become: yes
  vars_files:
    - var.yml
  tags: ntp

  tasks:
    - name: Ensure chrony is installed
      apt:
        name: chrony
        state: present

    - name: Deploy chrony configuration from template
      template:
        src: templates/chrony.conf.j2
        dest: /etc/chrony/chrony.conf
        owner: root
        group: root
        mode: '0644'
      notify: Restart chronyd

    - name: Enable and start chronyd service
      systemd:
        name: chronyd
        state: started
        enabled: yes

    - name: Enable NTP synchronization via timedatectl
      command: timedatectl set-ntp true
      changed_when: false

  handlers:
    - name: Restart chronyd
      systemd:
        name: chronyd
        state: restarted
