---
#==============================================================================
# Playbook: install-certs.yml
# Description: Install Zscaler, APMM and APMM Issuing CA TLS certificates
# Tags: certs
#==============================================================================

- name: Install TLS Certificates
  hosts: all
  become: yes
  vars_files:
    - var.yml
  tags: certs

  tasks:
    - name: Install ca-certificates package
      apt:
        name: ca-certificates
        state: present
        update_cache: yes

    - name: Deploy Zscaler Root CA certificate
      copy:
        src: files/certs/zscaler-root-ca.crt
        dest: /usr/local/share/ca-certificates/zscaler-root-ca.crt
        owner: root
        group: root
        mode: '0644'
      notify: Update CA certificates

    - name: Deploy APMM Root CA certificate
      copy:
        src: files/certs/apmm-root-ca.crt
        dest: /usr/local/share/ca-certificates/apmm-root-ca.crt
        owner: root
        group: root
        mode: '0644'
      notify: Update CA certificates

    - name: Deploy APMM Corporate Issuing CA 1 certificate
      copy:
        src: files/certs/apmm-corporate-issuing-ca-1.crt
        dest: /usr/local/share/ca-certificates/apmm-corporate-issuing-ca-1.crt
        owner: root
        group: root
        mode: '0644'
      notify: Update CA certificates

  handlers:
    - name: Update CA certificates
      command: update-ca-certificates
      register: ca_update
      changed_when: "'added' in ca_update.stdout"
