#     ansible-playbook manifest.yml -i inventory.ini --tags security-tools
#     ansible-playbook manifest.yml -i inventory.ini --tags ntp
#     ansible-playbook manifest.yml -i inventory.ini --tags banners
#     ansible-playbook manifest.yml -i inventory.ini --tags users
#==============================================================================

- import_playbook: install-certs.yml
- import_playbook: pre-requisites.yml
- import_playbook: install-security-tools.yml
