---
#==============================================================================
# Playbook: add-users.yml
# Description: Create local users with password policy enforcement
# Tags: users
#
# Users are defined in var.yml -> users list
# admin: true  -> user is added to sudo group
# admin: false -> standard user
#==============================================================================

- name: Add Users
  hosts: all
  become: yes
  vars_files:
    - var.yml
  tags: users

  tasks:
    - name: Create user accounts
      user:
        name: "{{ item.name }}"
        shell: /bin/bash
        create_home: yes
        state: present
      loop: "{{ users }}"
      when: users | length > 0

    - name: Set user passwords
      user:
        name: "{{ item.name }}"
        password: "{{ item.password | password_hash('sha512') }}"
      loop: "{{ users }}"
      no_log: true
      when: users | length > 0

    - name: Add admin users to sudo group
      user:
        name: "{{ item.name }}"
        groups: sudo
        append: yes
      loop: "{{ users }}"
      when:
        - users | length > 0
        - item.admin | default(false)

    - name: Set password policy (min 1 day, max 90 days, warn 7 days)
      command: chage --mindays 1 --maxdays 90 --warndays 7 {{ item.name }}
      loop: "{{ users }}"
      changed_when: true
      when: users | length > 0
