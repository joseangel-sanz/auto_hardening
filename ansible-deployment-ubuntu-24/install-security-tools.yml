---
#==============================================================================
# Playbook: install-security-tools.yml
# Description: Install TrendMicro ds-agent, CrowdStrike Falcon, Qualys agent
# Tags: security-tools
#
# Prerequisites:
#   - Place falcon-sensor*.deb     in files/packages/
#   - Place QualysCloudAgent*.deb  in files/packages/
#   - Set ds_agent_proxy_type in var.yml (noproxy | nraproxy | zscalerproxy)
#==============================================================================

- name: Install Security Tools
  hosts: all
  become: yes
  vars_files:
    - var.yml
  tags: security-tools

  tasks:

    # ------------------------------------------------------------------
    # TrendMicro Deep Security Agent
    # ------------------------------------------------------------------
    - name: Copy ds-agent deployment script (NoProxy)
      copy:
        src: files/ds-agent/LinuxAgentDeploymentScript_NoProxy.sh
        dest: /tmp/ds-agent-deploy.sh
        mode: '0755'
      when: ds_agent_proxy_type == 'noproxy'

    - name: Copy ds-agent deployment script (NRAProxy)
      copy:
        src: files/ds-agent/LinuxAgentDeploymentScript_NRAProxy.sh
        dest: /tmp/ds-agent-deploy.sh
        mode: '0755'
      when: ds_agent_proxy_type == 'nraproxy'

    - name: Copy ds-agent deployment script (ZscalerProxy)
      copy:
        src: files/ds-agent/LinuxAgentDeploymentScript_ZscalerProxy.sh
        dest: /tmp/ds-agent-deploy.sh
        mode: '0755'
      when: ds_agent_proxy_type == 'zscalerproxy'

    - name: Run TrendMicro ds-agent deployment script
      command: /tmp/ds-agent-deploy.sh
      register: ds_agent_result
      changed_when: true

    - name: Show ds-agent installation result
      debug:
        msg: "{{ ds_agent_result.stdout_lines }}"

    # ------------------------------------------------------------------
    # CrowdStrike Falcon Sensor
    # NOTE: Place falcon-sensor*.deb in files/packages/ before running
    # ------------------------------------------------------------------
    - name: Copy Falcon Sensor package to remote host
      copy:
        src: "{{ item }}"
        dest: /tmp/
        mode: '0644'
      with_fileglob:
        - "files/packages/falcon-sensor*.deb"

    - name: Find Falcon Sensor package on remote host
      find:
        paths: /tmp
        patterns: "falcon-sensor*.deb"
      register: falcon_pkg

    - name: Install Falcon Sensor package
      apt:
        deb: "{{ falcon_pkg.files[0].path }}"
      when: falcon_pkg.files | length > 0

    - name: Configure Falcon Sensor CID
      command: "/opt/CrowdStrike/falconctl -s --cid={{ falcon_cid }}"
      when: falcon_pkg.files | length > 0

    - name: Configure Falcon Sensor proxy
      command: "/opt/CrowdStrike/falconctl -s --aph={{ falcon_proxy_host }} --app={{ falcon_proxy_port }}"
      when: falcon_pkg.files | length > 0

    - name: Disable Falcon Sensor proxy auto-detection
      command: "/opt/CrowdStrike/falconctl -s --apd=FALSE"
      when: falcon_pkg.files | length > 0

    - name: Restart Falcon Sensor service
      systemd:
        name: falcon-sensor
        state: restarted
        enabled: yes
      when: falcon_pkg.files | length > 0

    # ------------------------------------------------------------------
    # Qualys Cloud Agent
    # NOTE: Place QualysCloudAgent*.deb in files/packages/ before running
    # ------------------------------------------------------------------
    - name: Copy Qualys Cloud Agent package to remote host
      copy:
        src: "{{ item }}"
        dest: /tmp/
        mode: '0644'
      with_fileglob:
        - "files/packages/QualysCloudAgent*.deb"

    - name: Find Qualys Cloud Agent package on remote host
      find:
        paths: /tmp
        patterns: "QualysCloudAgent*.deb"
      register: qualys_pkg

    - name: Install Qualys Cloud Agent
      apt:
        deb: "{{ qualys_pkg.files[0].path }}"
      when: qualys_pkg.files | length > 0

    - name: Activate Qualys Cloud Agent
      command: >
        /usr/local/qualys/cloud-agent/bin/qualys-cloud-agent.sh
        ActivationId={{ qualys_activation_id }}
        CustomerId={{ qualys_customer_id }}
      when: qualys_pkg.files | length > 0

    - name: Configure Qualys proxy settings
      copy:
        content: |
          https_proxy={{ qualys_proxy }}
          qualys_https_proxy={{ qualys_proxy }}
        dest: /etc/sysconfig/qualys-cloud-agent
        owner: root
        group: root
        mode: '0644'
      when: qualys_pkg.files | length > 0

    - name: Restart Qualys Cloud Agent service
      systemd:
        name: qualys-cloud-agent
        state: restarted
        enabled: yes
      when: qualys_pkg.files | length > 0

    - name: Run Qualys on-demand VM scan
      command: /usr/local/qualys/cloud-agent/bin/cloudagentctl.sh action=demand type=vm cputhrottle=0
      when: qualys_pkg.files | length > 0
