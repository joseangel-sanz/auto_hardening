---
#==============================================================================
# Variables: var.yml
# Description: Configuration variables for Ubuntu 24 deployment
# Edit this file before running manifest.yml
#==============================================================================

# -----------------------------------------------------------------------
# NTP - Maersk internal NTP servers
# -----------------------------------------------------------------------
ntp_servers:
  - 10.255.127.1
  - 10.255.127.12

# -----------------------------------------------------------------------
# Environment type
# Values: production | uat
# -----------------------------------------------------------------------
environment_type: production

# -----------------------------------------------------------------------
# TrendMicro Deep Security Agent proxy type
# Values: noproxy | nraproxy | zscalerproxy
# -----------------------------------------------------------------------
ds_agent_proxy_type: noproxy

# -----------------------------------------------------------------------
# CrowdStrike Falcon Sensor
# -----------------------------------------------------------------------
falcon_cid: "58CE029866E14481A529D5E495AEB242-76"
falcon_proxy_host: "10.0.11.1"
falcon_proxy_port: "9400"

# -----------------------------------------------------------------------
# Qualys Cloud Agent
# -----------------------------------------------------------------------
qualys_activation_id: "56304d81-63a4-4026-a034-9aba4a961b0b"
qualys_customer_id: "183554fa-0bc8-cb39-837d-10f521fe6a8b"
qualys_proxy: "http://10.255.237.21:8887"

# -----------------------------------------------------------------------
# Users to create on the target server
# admin: true  -> adds user to sudo group
# admin: false -> standard user (no sudo)
# -----------------------------------------------------------------------
users: []
# Example:
# users:
#   - name: jsmith
#     admin: true
#     password: "changeme123"
#   - name: jdoe
#     admin: false
#     password: "changeme456"
